name: Validate levels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate puzzle bank
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate every level is valid and uniquely solvable
        run: node validate-levels.js
        env:
          MIN_PER_DIFFICULTY: 1000
